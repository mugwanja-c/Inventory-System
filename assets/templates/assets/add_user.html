<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New User</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff0f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: #ff4da6;
            font-size: 28px;
            margin-bottom: 5px;
        }

        p {
            color: #ff99cc;
            margin-bottom: 20px;
        }

        form {
            background: #ffe6f2;
            padding: 15px;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"], input[type="email"], input[type="password"], select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ff99cc;
            box-sizing: border-box;
        }

        .btn-add {
            background: #ff4da6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-add:hover {
            background: #ff1a75;
        }

        .flash-message {
            background: #ff99cc;
            color: white;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        a.back-link {
            display: inline-block;
            margin-top: 10px;
            color: #ff4da6;
            text-decoration: none;
        }

        a.back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Add New User</h1>
    <p>Fill in the form below to create a new user.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="flash-message">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'add_user' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" placeholder="Enter email" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter password" minlength="8" required>
        </div>
        <div class="form-group">
            <label for="role">Role:</label>
            <select id="role" name="role" required>
                <option value="Staff">Staff</option>
                <option value="User">Customer</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
        <button type="submit" class="btn-add">Add User</button>
    </form>

    <a href="{% url 'settings' %}" class="back-link">&larr; Back to Settings</a>
</div>
</body>
</html>
