<!DOCTYPE html>
<html>
<head>
<title>Edit Supplier</title>

<style>
body { 
font-family:'Segoe UI'; 
background:#fff0f5; 
padding:30px; 
}
.container {
    background:white;
    padding:25px;
    max-width:450px;
    margin:auto;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2 { color:#ff3399; }

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

button {
    background:#ff3399;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
}

button:hover { 
background:#e60073; 
}

a { 
margin-left:10px; 
color:#555; 
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Edit Supplier</h2>
    {% if messages %}
    {% for message in messages %}
        <p style="color:red; text-align:center;">
            {{ message }}
        </p>
    {% endfor %}
    {% endif %}
    <form method="POST" action="{% url 'edit_supplier' supplier.id %}">
        {% csrf_token %}

        <input type="text" name="name" value="{{ supplier.name }}">
        <input type="text" name="contact" value="{{ supplier.contact }}">
        <input type="email" name="email" value="{{ supplier.email }}">

        <button type="submit">Update</button>
        <a href="{% url 'suppliers' %}">Cancel</a>
    </form>
</div>

</body>
</html>
