<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit User</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #fff0f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    color: #ff3399;
    margin-bottom: 20px;
}

label {
    font-weight: 500;
    display: block;
    margin-top: 10px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.btn {
    width: 100%;
    padding: 10px;
    margin-top: 20px;
    border: none;
    border-radius: 6px;
    background: #ff66b2;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.btn:hover {
    background: #ff3399;
}

.back {
    display: block;
    text-align: center;
    margin-top: 15px;
    text-decoration: none;
    color: #ff3399;
}

.message {
    background: #ffe6e6;
    color: #b30000;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <h2>Edit User</h2>

    {% if message %}
        <div class="message">
            {{ message }}
        </div>
    {% endif %}

    <form method="POST" action="{% url 'edit_user' user.id %}">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" value="{{ user.username }}" required>

        <label>Email</label>
        <input type="text" name="email" value="{{ user.email }}" required>

        <button type="submit" class="btn">Save Changes</button>
    </form>

    <a href="{% url 'settings' %}" class="back">&larr; Back to Settings</a>

</div>

</body>
</html>
