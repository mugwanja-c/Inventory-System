<!DOCTYPE html>
<html>
<head>
<title>Edit Item</title>

<style>
body { font-family:'Segoe UI'; background:#fff0f5; padding:30px; }

.container {
    background:white;
    padding:25px;
    max-width:600px;
    margin:auto;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2 { color:#ff3399; }

input, select {
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

button {
    background:#ff3399;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
}

button:hover { background:#e60073; }

a {
    margin-left:10px;
    text-decoration:none;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

<h2>Edit Item</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" value="{{ item.name }}">
    <input type="text" name="barcode" value="{{ item.barcode }}">
    <input type="number" name="quantity" value="{{ item.quantity }}">
    <input type="number" step="0.01" name="price" value="{{ item.price }}">

    <select name="category">
        {% for category in categories %}
            <option value="{{ category.id }}"
                {% if item.category.id == category.id %}selected{% endif %}>
                {{ category.name }}
            </option>
        {% endfor %}
    </select>

    <select name="location">
        {% for location in locations %}
            <option value="{{ location.id }}"
                {% if item.location.id == location.id %}selected{% endif %}>
                {{ location.branch_name }}
            </option>
        {% endfor %}
    </select>

    <select name="supplier">
        {% for supplier in suppliers %}
            <option value="{{ supplier.id }}"
                {% if item.supplier.id == supplier.id %}selected{% endif %}>
                {{ supplier.name }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Update</button>
    <a href="{% url 'items' %}">Cancel</a>
</form>

</div>

</body>
</html>
