{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile</title>

<link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">

<style>
body {
    font-family: Arial, sans-serif;
    background: #fff0f5; /* soft blush background */
    margin: 0;
}

.container {
    max-width: 600px;
    margin: 60px auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(255, 105, 180, 0.15);
    border: 1px solid #ffd6e7;
}
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #d63384; /* strong pink accent */
}
.form-group {
    margin-bottom: 15px;
}
label {
    display: block;
     margin-bottom: 5px;
    font-weight: bold;
    color: #b03060;
}
input {
    width: 100%;
    padding: 10px;
    border: 1px solid #f3b6cc;
    border-radius: 8px;
    background: #fff7fa;
    outline: none;
    transition: 0.2s ease;
}
input:focus {
    border-color: #ff69b4;
    box-shadow: 0 0 0 3px rgba(255, 105, 180, 0.15);
}
.btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #ff69b4, #ff85c1);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s ease;
}
.btn:hover {
    background: linear-gradient(135deg, #ff4fa3, #ff6fb8);
    transform: translateY(-1px);
}
</style>
</head>

<body>

<div class="container">

    <h2>My Profile</h2>
    {% for message in messages %}
    {% if message.tags == "error" %}
        <small style="color:red;">{{ message }}</small>
    {% endif %}
    {% endfor %}
    <form method="POST"action="{% url 'accounts:profile' %}">
        {% csrf_token %}

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" value="{{ profile.phone }}">
        </div>

        <button type="submit" class="btn">
            Update Profile
        </button>
    </form>
</div>
</body>
</html>
